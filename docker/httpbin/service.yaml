apiVersion: v1
kind: Service
metadata:
  name: nexa-app-service
  labels:
    app: nexa-app
spec:
  type: NodePort  # 关键：使用 NodePort 暴露到节点网络
  selector:
    app: nexa-app
  ports:
    - name: http
      port: 8080       # 集群内访问端口
      targetPort: 8080 # 容器内端口
      nodePort: 30080  # 节点对外暴露端口 (范围 30000-32767)
      protocol: TCP

    - name: https
      port: 8443
      targetPort: 8443
      nodePort: 30443
      protocol: TCP